<div class="watchlist-page">
  <!-- Header -->
  <div class="header">
    <a routerLink="/" class="back-btn">← Back to Home</a>
    <h1>🎯 My Watchlist</h1>
    <p class="count">{{ movies.length }} movie{{ movies.length !== 1 ? 's' : '' }} saved</p>
  </div>

  <!-- Grid -->
  <div class="grid" *ngIf="movies.length > 0">
    <app-movie-card
      *ngFor="let movie of movies"
      [movie]="movie"
      [isInWatchlist]="true"
      (removeFromWatchlist)="onRemove($event)"
    />
  </div>

  <!-- Empty State -->
  <div class="empty" *ngIf="movies.length === 0">
    <p>😕 Watchlist khali hai!</p>
    <a routerLink="/" class="browse-btn">Browse Movies</a>
  </div>
</div>
